name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  validate:
    name: Validate starter repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Compile Python files
        run: python -m compileall src synthetic-data validation tests

      - name: Validate bundled synthetic sample
        run: python validation/validate_dataset.py synthetic-data/sample_20.csv

      - name: Generate synthetic smoke-test dataset
        run: python synthetic-data/generate.py --count 25 --missingness 0.1 --output /tmp/mho_synthetic.csv

      - name: Validate generated smoke-test dataset
        run: python validation/validate_dataset.py /tmp/mho_synthetic.csv

      - name: Run tests
        run: python -m pytest
